<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — 99 DOTS Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Julius+Sans+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Manrope',sans-serif;background:#ffffff;color:#271a15}
body{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;text-align:center;padding:40px}
.num{font-family:'Julius Sans+One',serif;font-size:clamp(80px,15vw,160px);color:#b87c55;letter-spacing:0.05em;line-height:1}
.msg{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(39,26,21,0.4);margin-top:16px;margin-bottom:48px}
a{display:inline-block;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#271a15;text-decoration:none;border-bottom:1px solid #b87c55;padding-bottom:3px;transition:color .2s}
a:hover{color:#b87c55}
</style>
</head>
<body>
<div class="num">404</div>
<p class="msg">Esta página no existe</p>
<a href="/">Volver al inicio</a>
</body>
</html>
